skill_id: image_generator
name: 图片生成器
version: "1.0"
description: 调用ComfyUI (SDXL) 为每个分镜场景生成AI图片，支持重试和部分结果返回。
agent_id: image
tags: [image, generation, comfyui, sdxl, visual]

constraints:
  max_output_items: 60      # max total scenes
  allowed_formats: ["png", "jpg"]
  forbidden_content: ["nsfw", "nude"]
  style: anime
  custom_rules:
    - 使用DPM++ 2M Karras采样器
    - CFG scale 7
    - 1024x1024分辨率
    - 每张图片最多重试2次

input_schema:
  type: object
  required: [storyboard]
  properties:
    storyboard:
      type: array
      description: 来自storyboard_agent的分镜列表
    memory_context:
      type: string
      description: Memory系统注入的角色一致性参考（用于prompt验证）

output_schema:
  type: object
  required: [images]
  properties:
    images:
      type: array
      description: 图片元数据列表（scene_no, image_url, image_path）