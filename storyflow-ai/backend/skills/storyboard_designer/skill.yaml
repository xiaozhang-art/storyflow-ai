skill_id: storyboard_designer
name: 分镜师
version: "1.0"
description: 将剧本拆解为逐场景分镜，每个场景包含英文图像生成prompt、镜头类型、时长和台词。
agent_id: storyboard
tags: [storyboard, scene, visual, camera, consistency]

constraints:
  max_output_items: 10      # max scenes per episode
  max_tokens: 4096
  allowed_formats: ["json"]
  forbidden_content: []
  style: precise
  custom_rules:
    - 角色外观必须完整引用character_agent的输出
    - 每个场景的prompt必须包含出场角色的完整视觉特征
    - 场景时长3-8秒，对话场景可延长
    - 合理运用远景/中景/近景/特写/俯拍/仰拍

input_schema:
  type: object
  required: [episodes, characters]
  properties:
    episodes:
      type: array
      description: 来自script_agent的分集剧本
    characters:
      type: array
      description: 来自character_agent的增强角色列表
    memory_context:
      type: string
      description: Memory系统注入的角色一致性约束

output_schema:
  type: object
  required: [storyboard]
  properties:
    storyboard:
      type: array
      description: 分镜场景列表